name: Release

on:
  push:
    branches:
      - main
      - stable
      - develop
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Compute semantic version ──────────────────────────────────────────────
  version:
    name: Compute version
    runs-on: ubuntu-latest
    outputs:
      semVer: ${{ steps.gv.outputs.semVer }}
      majorMinorPatch: ${{ steps.gv.outputs.majorMinorPatch }}
      buildMetaData: ${{ steps.gv.outputs.buildMetaData }}
      stamp: ${{ steps.stamp.outputs.stamp }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: "5.x"

      - name: Execute GitVersion
        id: gv
        uses: gittools/actions/gitversion/execute@v3
        with:
          useConfigFile: true

      - name: Compute date stamp
        id: stamp
        run: echo "stamp=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

  # ── Cross-compile all targets inside the release container ───────────────
  build:
    name: Cross-compile (all targets)
    runs-on: ubuntu-latest
    needs: version
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build release container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/release/Dockerfile
          load: true
          tags: analyzer-cli-release:local
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run cross-compile pipeline
        run: |
          docker run --rm \
            -e ANALYZER_RELEASE_VERSION="${{ needs.version.outputs.majorMinorPatch }}" \
            -e ANALYZER_RELEASE_BUILD="${{ needs.version.outputs.buildMetaData || '0' }}" \
            -e ANALYZER_RELEASE_STAMP="${{ needs.version.outputs.stamp }}" \
            -v "${{ github.workspace }}:/workspace" \
            analyzer-cli-release:local

      - name: Upload archives as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-archives
          path: dist/releases/**/*.zip
          retention-days: 30

  # ── Create or update GitHub Release with all archives ────────────────────
  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [version, build]
    env:
      VERSION: ${{ needs.version.outputs.semVer }}
      STAMP: ${{ needs.version.outputs.stamp }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download archives
        uses: actions/download-artifact@v4
        with:
          name: release-archives
          path: dist/releases

      - name: Derive tag name
        id: tag
        run: |
          # For tag-triggered runs use the tag; otherwise derive from branch + version.
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            BRANCH="${GITHUB_REF_NAME}"   # main / stable / develop
            echo "tag=v${VERSION}-${BRANCH}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          ARCHIVES=$(find dist/releases -name "*.zip" | tr '\n' ' ')
          if gh release view "$TAG" &>/dev/null; then
            gh release upload "$TAG" $ARCHIVES --clobber
          else
            PRERELEASE=""
            [[ "${GITHUB_REF_NAME}" != "main" ]] && PRERELEASE="--prerelease"
            gh release create "$TAG" $ARCHIVES \
              --title "Release $TAG ($STAMP)" \
              --generate-notes \
              $PRERELEASE
          fi

  # ── Update Homebrew tap (main / tag only) ─────────────────────────────────
  homebrew:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs: [publish]
    if: github.ref_name == 'main' || github.ref_type == 'tag'
    steps:
      - uses: actions/checkout@v4

      - name: Update Homebrew formula
        uses: dawidd6/action-homebrew-bump-formula@v4
        continue-on-error: true
        with:
          token: ${{ secrets.EXEIN_TOOLS_SSH_PRIVATE_KEY }}
          tap: exein-io/tools
          formula: analyzer
          tag: ${{ needs.version.outputs.semVer }}
