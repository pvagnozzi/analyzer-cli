name: Release

on:
  push:
    branches:
      - main
      - stable
      - develop
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Compute semantic version ──────────────────────────────────────────────
  version:
    name: Compute version
    runs-on: ubuntu-latest
    outputs:
      semVer: ${{ steps.compute.outputs.semVer }}
      majorMinorPatch: ${{ steps.compute.outputs.majorMinorPatch }}
      buildMetaData: ${{ steps.compute.outputs.buildMetaData }}
      stamp: ${{ steps.compute.outputs.stamp }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: compute
        run: |
          BASE=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          BUILD=$(git rev-list --count HEAD)
          BRANCH="${GITHUB_REF_NAME}"
          case "$BRANCH" in
            main)   SEMVER="${BASE}" ;;
            stable) SEMVER="${BASE}-stable.${BUILD}" ;;
            *)      SEMVER="${BASE}-${BRANCH//\//-}.${BUILD}" ;;
          esac
          echo "majorMinorPatch=${BASE}" >> "$GITHUB_OUTPUT"
          echo "buildMetaData=${BUILD}"  >> "$GITHUB_OUTPUT"
          echo "semVer=${SEMVER}"        >> "$GITHUB_OUTPUT"

      - name: Compute date stamp
        id: stamp
        run: echo "stamp=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

  # ── Cross-compile all targets inside the release container ───────────────
  build:
    name: Cross-compile (all targets)
    runs-on: ubuntu-latest
    needs: version
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build release container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/release/Dockerfile
          load: true
          tags: analyzer-cli-release:local
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run cross-compile pipeline
        run: |
          docker run --rm \
            -e ANALYZER_RELEASE_VERSION="${{ needs.version.outputs.majorMinorPatch }}" \
            -e ANALYZER_RELEASE_BUILD="${{ needs.version.outputs.buildMetaData || '0' }}" \
            -e ANALYZER_RELEASE_STAMP="${{ needs.version.outputs.stamp }}" \
            -v "${{ github.workspace }}:/workspace" \
            analyzer-cli-release:local

      - name: Upload archives as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-archives
          path: dist/releases/**/*.zip
          if-no-files-found: error
          retention-days: 30

  # ── Create or update GitHub Release with all archives ────────────────────
  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [version, build]
    env:
      VERSION: ${{ needs.version.outputs.semVer }}
      STAMP: ${{ needs.version.outputs.stamp }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download archives
        uses: actions/download-artifact@v4
        with:
          name: release-archives
          path: dist/releases

      - name: Derive tag name
        id: tag
        run: |
          # For tag-triggered runs use the tag as-is.
          # For branch-triggered runs use the full semVer from GitVersion,
          # which already carries pre-release suffixes for non-main branches.
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          mapfile -t ARCHIVES < <(find dist/releases -name "*.zip" | sort)
          if [[ ${#ARCHIVES[@]} -eq 0 ]]; then
            echo "No archives found — aborting release." >&2
            exit 1
          fi

          PRERELEASE=""
          [[ "${GITHUB_REF_NAME}" != "main" ]] && PRERELEASE="--prerelease"

          # Create release if it doesn't exist yet; ignore "already exists" error
          # (handles concurrent main/stable runs targeting the same semver tag).
          gh release create "$TAG" \
            --title "Release $TAG ($STAMP)" \
            --generate-notes \
            $PRERELEASE 2>/dev/null || true

          # Upload/overwrite archives — idempotent
          gh release upload "$TAG" "${ARCHIVES[@]}" --clobber

  # ── Update Homebrew tap (main / tag only) ─────────────────────────────────
  homebrew:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs: [version, publish]
    if: github.ref_name == 'main' || github.ref_type == 'tag'
    steps:
      - uses: actions/checkout@v4

      - name: Update Homebrew formula
        uses: dawidd6/action-homebrew-bump-formula@v4
        continue-on-error: true
        with:
          token: ${{ secrets.EXEIN_TOOLS_SSH_PRIVATE_KEY }}
          tap: exein-io/tools
          formula: analyzer
          tag: ${{ needs.version.outputs.semVer }}
