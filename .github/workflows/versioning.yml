name: Versioning

on:
  push:
    branches:
      - main
      - stable
      - develop
      - feature/**
      - release/**
      - hotfix/**
  pull_request:
    branches:
      - main
      - stable
      - develop
  workflow_dispatch:

permissions:
  contents: read

jobs:
  version:
    name: Calculate semantic version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: compute
        run: |
          BASE=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          BUILD=$(git rev-list --count HEAD)
          BRANCH="${GITHUB_REF_NAME}"
          case "$BRANCH" in
            main)   SEMVER="${BASE}" ;;
            stable) SEMVER="${BASE}-stable.${BUILD}" ;;
            *)      SEMVER="${BASE}-${BRANCH//\//-}.${BUILD}" ;;
          esac
          echo "majorMinorPatch=${BASE}" >> "$GITHUB_OUTPUT"
          echo "buildMetaData=${BUILD}"  >> "$GITHUB_OUTPUT"
          echo "semVer=${SEMVER}"        >> "$GITHUB_OUTPUT"

      - name: Publish summary
        run: |
          echo "## Version" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch:     ${GITHUB_REF_NAME}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Base:       ${{ steps.compute.outputs.majorMinorPatch }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- SemVer:     ${{ steps.compute.outputs.semVer }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Build meta: ${{ steps.compute.outputs.buildMetaData }}" >> "$GITHUB_STEP_SUMMARY"
